name: Build for 20i

# 20i's "FTP Locked" account security blocks connections from unrecognized
# IPs, including GitHub-hosted runners (confirmed via ECONNRESET on FTP and
# FTPS alike). So this workflow only builds the app and publishes it as a
# downloadable artifact; the actual FTP upload to 20i happens from a machine
# on an allowlisted IP (see scripts/deploy-20i.mjs).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Install PHP dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Package build
        run: |
          tar --exclude='./.git' --exclude='./.github' --exclude='./node_modules' \
              --exclude='./tests' --exclude='./.env' --exclude='./.env.example' \
              -czf /tmp/site-build.tar.gz .
          mv /tmp/site-build.tar.gz site-build.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: site-build.tar.gz
          retention-days: 3

      # Migrations, seeders, and cache warm-up still run manually via 20i SSH
      # per the checklist in CLAUDE.md — this workflow only builds the app.
